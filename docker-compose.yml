services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: whats_bot
      POSTGRES_PASSWORD: whats_bot
      POSTGRES_DB: whats_bot
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.worker worker --loglevel=info

  celery-beat:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.worker beat --loglevel=info

volumes:
  pgdata:
  redisdata:
